[package]
name = "ardor-solutions-desktop"
version = "0.2.5"
description = "Ardor Solutions desktop prototype"
edition = "2021"
rust-version = "1.77"

[lib]
name = "ardor_solutions_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
tauri = { version = "2", features = ["devtools"] }
time = "=0.3.47"
