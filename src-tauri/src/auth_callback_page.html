<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>%%DOCUMENT_TITLE%%</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #fafafa;
        --card: #ffffff;
        --foreground: #18181b;
        --muted-foreground: #71717a;
        --border: #e4e4e7;
        --shadow: rgba(24, 24, 27, 0.08);
        --success: #22c55e;
        --success-background: #f0fdf4;
        --success-border: #bbf7d0;
        --error: #dc2626;
        --error-background: #fef2f2;
        --error-border: #fecaca;
        --action: #f97316;
        --action-hover: #ea580c;
      }

      * { box-sizing: border-box; }

      html { min-height: 100%; }

      body {
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        padding: 32px 20px;
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--foreground);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-rendering: optimizeLegibility;
      }

      .shell { width: min(380px, 100%); }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      .brand-mark { width: 22px; height: 22px; }

      .brand-name {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
      }

      .brand-product {
        margin-left: -3px;
        color: var(--muted-foreground);
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.18em;
      }

      .card {
        padding: 36px 32px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        box-shadow: 0 16px 48px var(--shadow);
        text-align: center;
      }

      .status-icon {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        margin: 0 auto 24px;
        border: 1px solid var(--state-border);
        border-radius: 50%;
        background: var(--state-background);
        color: var(--state);
      }

      body[data-state="success"] {
        --state: var(--success);
        --state-background: var(--success-background);
        --state-border: var(--success-border);
      }

      body[data-state="error"] {
        --state: var(--error);
        --state-background: var(--error-background);
        --state-border: var(--error-border);
      }

      body[data-state="success"] .error-glyph,
      body[data-state="error"] .success-glyph { display: none; }

      .status-icon svg { width: 22px; height: 22px; }

      h1 {
        margin: 0;
        font-size: clamp(26px, 7vw, 32px);
        font-weight: 650;
        letter-spacing: -0.035em;
        line-height: 1.15;
      }

      .message {
        margin: 12px auto 0;
        max-width: 290px;
        color: var(--muted-foreground);
        font-size: 15px;
        line-height: 1.55;
      }

      .handoff-form { margin: 24px 0 0; }

      .handoff {
        min-height: 42px;
        padding: 10px 18px;
        border: 0;
        border-radius: 8px;
        background: var(--action);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 650;
        transition: background-color 150ms ease;
      }

      .handoff:hover { background: var(--action-hover); }

      .handoff:focus-visible {
        outline: 2px solid var(--action);
        outline-offset: 3px;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #09090b;
          --card: #18181b;
          --foreground: #fafafa;
          --muted-foreground: #a1a1aa;
          --border: #3f3f46;
          --shadow: rgba(0, 0, 0, 0.36);
          --success: #4ade80;
          --success-background: #052e16;
          --success-border: #166534;
          --error: #fb7185;
          --error-background: #2a1115;
          --error-border: #881337;
        }
      }

      @media (max-width: 480px) {
        body { padding: 20px 16px; }
        .card { padding: 32px 24px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .handoff { transition: none; }
      }
    </style>
  </head>
  <body data-state="%%STATE%%">
    <main class="shell">
      <div class="brand" aria-label="Ardor Desktop">
        <svg class="brand-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">

          <defs><linearGradient id="brand-gradient" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#FF9700"/><stop offset="1" stop-color="#9000AF"/></linearGradient></defs>
        </svg>
        <span class="brand-name">ARDOR</span>
        <span class="brand-product">DESKTOP</span>
      </div>

      <section class="card" aria-labelledby="page-title" aria-live="polite">
        <div class="status-icon" aria-hidden="true">
          <svg class="success-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 4.2 4.2L19 6.5"/></svg>
          <svg class="error-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 7v6"/><path d="M12 17.2h.01"/><circle cx="12" cy="12" r="9"/></svg>
        </div>

        <h1 id="page-title">%%TITLE%%</h1>
        <p class="message">%%MESSAGE%%</p>
        %%HANDOFF%%
      </section>
    </main>
  </body>
</html>
