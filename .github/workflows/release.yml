name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      noop:
        description: Run semantic-release in dry-run mode
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  slack-start:
    name: Send initial Slack message
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.slack-post.outputs.ts }}
      details: ${{ steps.msg.outputs.details }}
      start_epoch: ${{ steps.timer.outputs.epoch }}
      slack_enabled: ${{ steps.slack-config.outputs.enabled }}
    steps:
      - name: Record Start Time
        id: timer
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Detect Slack configuration
        id: slack-config
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Slack secrets are not configured; skipping Slack notifications."
          fi

      - name: Formulate Message
        id: msg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.noop }}" = "true" ]; then
            MODE="Dry run"
          else
            MODE="Release"
          fi

          DETAILS="*Triggered by:* ${{ github.triggering_actor || github.actor }}\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Release #${{ github.run_number }}>\n*Repository:* ${{ github.repository }}\n*Ref:* ${{ github.ref_name }}\n*Mode:* $MODE"
          MESSAGE="⏳ *Desktop release started*...\n$DETAILS"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "message<<$EOF" >> "$GITHUB_OUTPUT"
          echo -e "$MESSAGE" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
          echo "details<<$EOF" >> "$GITHUB_OUTPUT"
          echo -e "$DETAILS" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Send Initial Slack Message
        id: slack-post
        if: steps.slack-config.outputs.enabled == 'true'
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 # v1.24.0
        with:
          channel-id: '${{ secrets.SLACK_CHANNEL_ID }}'
          payload: |
            { "text": ${{ toJSON(steps.msg.outputs.message) }} }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  release:
    name: Release
    needs: slack-start
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    env:
      BUN_CONFIG_AUDIT: "false"
      NODE_OPTIONS: "--max-old-space-size=4096"
    permissions:
      contents: read
    outputs:
      released: ${{ steps.released-tag.outputs.released }}
      tag: ${{ steps.released-tag.outputs.tag }}
      solutions_ui_ref: ${{ steps.solutions-ui-ref.outputs.sha }}

    steps:
      - name: Create desktop release app token
        id: desktop-release-app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ardor-desktop
          permission-contents: write

      - name: Create read-only solutions-ui app token
        id: solutions-ui-app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: solutions-ui
          permission-contents: read

      - name: Get release app bot user id
        id: release-app-user
        env:
          GH_TOKEN: ${{ steps.desktop-release-app-token.outputs.token }}
        run: |
          echo "user-id=$(gh api '/users/${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]' --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Checkout release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.desktop-release-app-token.outputs.token }}
          persist-credentials: false

      - name: Force workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve configured solutions-ui ref
        id: solutions-ui-ref
        env:
          GH_TOKEN: ${{ steps.solutions-ui-app-token.outputs.token }}
        run: |
          pinned_ref="$(node -p "JSON.parse(require('fs').readFileSync('desktop-ui-requirements.json', 'utf8')).solutionsUiRef")"

          if ! [[ "$pinned_ref" =~ ^[0-9a-f]{40}$ ]]; then
            echo "desktop-ui-requirements.json must pin a lowercase 40-character commit SHA" >&2
            exit 1
          fi

          resolved_sha="$(gh api "repos/Ardor-Cerebrum/solutions-ui/commits/${pinned_ref}" --jq .sha)"
          if [ "$resolved_sha" != "$pinned_ref" ]; then
            echo "Pinned solutions-ui ref did not resolve to itself: $pinned_ref -> $resolved_sha" >&2
            exit 1
          fi

          echo "sha=$pinned_ref" >> "$GITHUB_OUTPUT"
          echo "Using pinned solutions-ui commit $pinned_ref"

      - name: Checkout solutions-ui compatibility preflight
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Ardor-Cerebrum/solutions-ui
          ref: ${{ steps.solutions-ui-ref.outputs.sha }}
          path: solutions-ui-preflight
          fetch-depth: 1
          token: ${{ steps.solutions-ui-app-token.outputs.token }}
          persist-credentials: false

      - name: Verify desktop UI compatibility before release
        run: node scripts/verify-desktop-ui-contract.mjs solutions-ui-preflight

      - name: Install preflight UI dependencies
        working-directory: solutions-ui-preflight
        run: bun install --frozen-lockfile

      - name: Test preflight desktop auth callback boundary
        working-directory: solutions-ui-preflight
        run: >-
          bun run test --
          src/lib/auth0-desktop-callback-bridge.test.tsx
          src/lib/auth0-desktop-marker-recovery.integration.test.tsx
          src/app.test.tsx

      - name: Type-check preflight UI
        working-directory: solutions-ui-preflight
        run: bun run type-check

      - name: Remove preflight checkout
        run: rm -rf -- solutions-ui-preflight

      - name: Configure git committer
        run: |
          git config user.name "${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.release-app-user.outputs.user-id }}+${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Capture current release tag
        id: previous-release
        run: |
          tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Semantic Release dry run
        if: github.event_name == 'workflow_dispatch' && inputs.noop
        env:
          GITHUB_TOKEN: ${{ steps.desktop-release-app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]
          GIT_AUTHOR_EMAIL: ${{ steps.release-app-user.outputs.user-id }}+${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]
          GIT_COMMITTER_EMAIL: ${{ steps.release-app-user.outputs.user-id }}+${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com
        run: bun run release --dry-run

      - name: Semantic Release
        id: semantic
        if: github.event_name != 'workflow_dispatch' || inputs.noop != true
        env:
          GITHUB_TOKEN: ${{ steps.desktop-release-app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]
          GIT_AUTHOR_EMAIL: ${{ steps.release-app-user.outputs.user-id }}+${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]
          GIT_COMMITTER_EMAIL: ${{ steps.release-app-user.outputs.user-id }}+${{ steps.desktop-release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com
        run: bun run release

      - name: Detect released tag
        id: released-tag
        if: github.event_name != 'workflow_dispatch' || inputs.noop != true
        run: |
          tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [ -n "$tag" ] && [ "$tag" != "${{ steps.previous-release.outputs.tag }}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft GitHub release
        if: steps.released-tag.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ steps.desktop-release-app-token.outputs.token }}
        run: |
          if gh release view "${{ steps.released-tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub Release for ${{ steps.released-tag.outputs.tag }} already exists"
            exit 0
          fi

          gh release create "${{ steps.released-tag.outputs.tag }}" --generate-notes --draft --verify-tag

  build-release-ui:
    name: Build production release UI
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: release-ui-${{ needs.release.outputs.tag }}-prod
      cancel-in-progress: false
    env:
      BUN_CONFIG_AUDIT: "false"
      NODE_OPTIONS: "--max-old-space-size=4096"
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
      SOLUTIONS_UI_REF: ${{ needs.release.outputs.solutions_ui_ref }}
    permissions:
      contents: read

    steps:
      - name: Create read-only solutions-ui app token
        id: solutions-ui-app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: solutions-ui
          permission-contents: read

      - name: Checkout desktop release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: ardor-desktop
          persist-credentials: false

      - name: Checkout solutions-ui
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Ardor-Cerebrum/solutions-ui
          ref: ${{ env.SOLUTIONS_UI_REF }}
          path: solutions-ui
          fetch-depth: 1
          token: ${{ steps.solutions-ui-app-token.outputs.token }}
          persist-credentials: false

      - name: Verify desktop UI compatibility
        run: node ardor-desktop/scripts/verify-desktop-ui-contract.mjs solutions-ui

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5

      - name: Install UI dependencies
        working-directory: solutions-ui
        run: bun install --frozen-lockfile

      - name: Test desktop auth callback bridge
        working-directory: solutions-ui
        run: >-
          bun run test --
          src/lib/auth0-desktop-callback-bridge.test.tsx
          src/lib/auth0-desktop-marker-recovery.integration.test.tsx
          src/app.test.tsx

      - name: Type-check UI
        working-directory: ardor-desktop
        run: bun run ui:type-check

      - name: Build production UI
        working-directory: ardor-desktop
        env:
          VITE_API_URL: ${{ vars.DESKTOP_PROD_API_URL }}
          VITE_ARTIFACT_API_URL: ${{ vars.DESKTOP_PROD_ARTIFACT_API_URL }}
          VITE_AUTH0_DOMAIN: ${{ vars.DESKTOP_PROD_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.DESKTOP_PROD_AUTH0_CLIENT_ID }}
          VITE_AMPLITUDE_API_KEY: ${{ vars.DESKTOP_PROD_AMPLITUDE_API_KEY }}
          VITE_DESKTOP_SENTRY_DSN: ${{ vars.DESKTOP_PROD_SENTRY_DSN }}
          VITE_STRIPE_PRICING_TABLE_ID: ${{ vars.DESKTOP_PROD_STRIPE_PRICING_TABLE_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.DESKTOP_PROD_STRIPE_PUBLISHABLE_KEY }}
        run: bun run ui:build:prod

      - name: Upload release UI
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-ui-prod
          path: solutions-ui/dist
          if-no-files-found: error
          retention-days: 7

  build-release-assets:
    name: Build ${{ matrix.label }} release asset
    needs: [release, build-release-ui]
    if: needs.release.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-prod
            label: macOS production
            os: macos-26
            platform: macos
            developer_dir: /Applications/Xcode_26.5.app/Contents/Developer
          - id: windows-prod
            label: Windows production
            os: windows-2025
            platform: windows
            developer_dir: ""
    concurrency:
      group: release-assets-${{ needs.release.outputs.tag }}-${{ matrix.id }}
      cancel-in-progress: false
    env:
      BUN_CONFIG_AUDIT: "false"
      NODE_OPTIONS: "--max-old-space-size=4096"
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
      DEVELOPER_DIR: ${{ matrix.developer_dir }}
    permissions:
      contents: read

    steps:
      - name: Checkout desktop release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: ardor-desktop
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: 1.88.0

      - name: Verify macOS SDK
        if: matrix.platform == 'macos'
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          clang --version

      - name: Verify Windows toolchain
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          rustc --version
          cargo --version
          if (Get-Command link.exe -ErrorAction SilentlyContinue) {
            Get-Command link.exe
          } else {
            Write-Host "MSVC link.exe was not found on PATH before build setup."
          }

      - name: Install desktop dependencies
        working-directory: ardor-desktop
        run: bun install --frozen-lockfile

      - name: Download prebuilt release UI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-ui-prod
          path: solutions-ui/dist

      - name: Build and sign production macOS app
        if: matrix.platform == 'macos'
        working-directory: ardor-desktop
        env:
          APPLE_SIGNING_IDENTITY: "-"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build:prod -- --bundles app --config src-tauri/tauri.updater-artifacts.conf.json

      - name: Verify production macOS code signature
        if: matrix.platform == 'macos'
        working-directory: ardor-desktop
        run: codesign --verify --deep --strict --verbose=2 src-tauri/target/release/bundle/macos/Ardor.app

      - name: Package production macOS app
        if: matrix.platform == 'macos'
        working-directory: ardor-desktop
        run: |
          mkdir -p dist/release
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/Ardor.app" \
            "dist/release/Ardor-${RELEASE_TAG}-macos.zip"
          cp "src-tauri/target/release/bundle/macos/Ardor.app.tar.gz" \
            "dist/release/Ardor-${RELEASE_TAG}-macos-aarch64.app.tar.gz"
          cp "src-tauri/target/release/bundle/macos/Ardor.app.tar.gz.sig" \
            "dist/release/Ardor-${RELEASE_TAG}-macos-aarch64.app.tar.gz.sig"

      - name: Build and sign production Windows installer
        if: matrix.platform == 'windows'
        working-directory: ardor-desktop
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build:prod -- --bundles nsis --config src-tauri/tauri.updater-artifacts.conf.json

      - name: Package Windows installer
        if: matrix.platform == 'windows'
        working-directory: ardor-desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release | Out-Null
          $installer = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS installer found"
          }

          Copy-Item $installer.FullName "dist/release/Ardor-$env:RELEASE_TAG-windows-x64-setup.exe"

          $signature = "$($installer.FullName).sig"
          if (-not (Test-Path $signature)) {
            throw "No updater signature found for $($installer.Name)"
          }

          Copy-Item $signature "dist/release/Ardor-$env:RELEASE_TAG-windows-x64-setup.exe.sig"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets-${{ matrix.id }}
          path: ardor-desktop/dist/release/*
          if-no-files-found: error
          retention-days: 7

  sign-update-manifests:
    name: Sign updater manifests
    needs: [release, build-release-assets]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    env:
      BUN_CONFIG_AUDIT: "false"
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
    permissions:
      contents: read

    steps:
      - name: Checkout desktop release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: ardor-desktop
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5

      - name: Install desktop dependencies
        working-directory: ardor-desktop
        run: bun install --frozen-lockfile

      - name: Test updater manifest generator
        working-directory: ardor-desktop
        run: bun run test:update-manifest

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Prepare updater metadata payloads
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun ardor-desktop/scripts/generate-update-manifest.mjs prepare

      - name: Sign updater metadata payloads
        working-directory: ardor-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          ./node_modules/.bin/tauri signer sign ../release-assets/latest.payload.json

      - name: Finalize updater manifests
        run: bun ardor-desktop/scripts/generate-update-manifest.mjs finalize

      - name: Upload signed updater manifests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signed-update-manifests
          path: release-assets/latest.json
          if-no-files-found: error
          retention-days: 7

  upload-release-assets:
    name: Upload release assets
    needs: [release, build-release-assets, sign-update-manifests]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: release-upload-${{ needs.release.outputs.tag }}
      cancel-in-progress: false
    env:
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
    permissions:
      contents: read

    steps:
      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ardor-desktop
          permission-contents: write

      - name: Verify draft release
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          is_draft="$(gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" --json isDraft --jq .isDraft)"
          if [ "$is_draft" != "true" ]; then
            echo "Expected $RELEASE_TAG to remain a draft until all updater assets are uploaded" >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Download signed updater manifests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: signed-update-manifests
          path: release-assets

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: gh release upload "$RELEASE_TAG" release-assets/* --repo "${{ github.repository }}" --clobber

      - name: Publish release as latest
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: gh release edit "$RELEASE_TAG" --repo "${{ github.repository }}" --draft=false --latest

  slack-update:
    name: Update Slack message
    needs: [slack-start, release, build-release-ui, build-release-assets, sign-update-manifests, upload-release-assets]
    if: always() && needs.slack-start.outputs.slack_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.release.result }}" != "success" ]; then
            echo "icon=❌" >> "$GITHUB_OUTPUT"
            echo "text=failed before release creation" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.release.outputs.released }}" != "true" ]; then
            echo "icon=ℹ️" >> "$GITHUB_OUTPUT"
            echo "text=completed without a new release" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build-release-ui.result }}" = "success" ] && [ "${{ needs.build-release-assets.result }}" = "success" ] && [ "${{ needs.sign-update-manifests.result }}" = "success" ] && [ "${{ needs.upload-release-assets.result }}" = "success" ]; then
            echo "icon=✅" >> "$GITHUB_OUTPUT"
            echo "text=completed successfully" >> "$GITHUB_OUTPUT"
          else
            echo "icon=❌" >> "$GITHUB_OUTPUT"
            echo "text=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute Duration
        id: duration
        run: |
          START="${{ needs.slack-start.outputs.start_epoch }}"
          END=$(date +%s)
          if [ -z "$START" ] || [ "$START" -le 0 ]; then
            echo "value=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ELAPSED=$((END - START))
          if [ "$ELAPSED" -ge 3600 ]; then
            H=$((ELAPSED / 3600))
            M=$((ELAPSED % 3600 / 60))
            S=$((ELAPSED % 60))
            DURATION="${H}h ${M}m ${S}s"
          elif [ "$ELAPSED" -ge 60 ]; then
            M=$((ELAPSED / 60))
            S=$((ELAPSED % 60))
            DURATION="${M}m ${S}s"
          else
            DURATION="${ELAPSED}s"
          fi

          echo "value=$DURATION" >> "$GITHUB_OUTPUT"

      - name: Formulate Update Message
        id: msg
        run: |
          DETAILS="${{ needs.slack-start.outputs.details }}"
          TAG="${{ needs.release.outputs.tag }}"

          if [ -n "$TAG" ]; then
            RELEASE_LINE="*Release:* <${{ github.server_url }}/${{ github.repository }}/releases/tag/$TAG|$TAG>"
          else
            RELEASE_LINE="*Release:* none"
          fi

          MESSAGE="${{ steps.status.outputs.icon }} *Desktop release ${{ steps.status.outputs.text }}!*\n*Duration:* ${{ steps.duration.outputs.value }}\n$RELEASE_LINE\n$DETAILS"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "message<<$EOF" >> "$GITHUB_OUTPUT"
          echo -e "$MESSAGE" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Update Slack Message
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 # v1.24.0
        with:
          channel-id: '${{ secrets.SLACK_CHANNEL_ID }}'
          update-ts: ${{ needs.slack-start.outputs.ts }}
          payload: |
            { "text": ${{ toJSON(steps.msg.outputs.message) }} }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
