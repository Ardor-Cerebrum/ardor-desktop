name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      noop:
        description: Run semantic-release in dry-run mode
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    env:
      BUN_CONFIG_AUDIT: "false"
      NODE_OPTIONS: "--max-old-space-size=4096"
    permissions:
      contents: read
    outputs:
      released: ${{ steps.released-tag.outputs.released }}
      tag: ${{ steps.released-tag.outputs.tag }}

    steps:
      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get release app bot user id
        id: release-app-user
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          echo "user-id=$(gh api '/users/${{ steps.release-app-token.outputs.app-slug }}[bot]' --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.release-app-token.outputs.token }}

      - name: Force workflow SHA
        run: git reset --hard ${{ github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git committer
        run: |
          git config user.name "${{ steps.release-app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.release-app-user.outputs.user-id }}+${{ steps.release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Capture current release tag
        id: previous-release
        run: |
          tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Semantic Release dry run
        if: github.event_name == 'workflow_dispatch' && inputs.noop
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.release-app-token.outputs.app-slug }}[bot]
          GIT_AUTHOR_EMAIL: ${{ steps.release-app-user.outputs.user-id }}+${{ steps.release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ steps.release-app-token.outputs.app-slug }}[bot]
          GIT_COMMITTER_EMAIL: ${{ steps.release-app-user.outputs.user-id }}+${{ steps.release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com
        run: bun run release --dry-run

      - name: Semantic Release
        id: semantic
        if: github.event_name != 'workflow_dispatch' || inputs.noop != true
        env:
          GITHUB_TOKEN: ${{ steps.release-app-token.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.release-app-token.outputs.app-slug }}[bot]
          GIT_AUTHOR_EMAIL: ${{ steps.release-app-user.outputs.user-id }}+${{ steps.release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: ${{ steps.release-app-token.outputs.app-slug }}[bot]
          GIT_COMMITTER_EMAIL: ${{ steps.release-app-user.outputs.user-id }}+${{ steps.release-app-token.outputs.app-slug }}[bot]@users.noreply.github.com
        run: bun run release

      - name: Detect released tag
        id: released-tag
        if: github.event_name != 'workflow_dispatch' || inputs.noop != true
        run: |
          tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [ -n "$tag" ] && [ "$tag" != "${{ steps.previous-release.outputs.tag }}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        if: steps.released-tag.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          if gh release view "${{ steps.released-tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub Release for ${{ steps.released-tag.outputs.tag }} already exists"
            exit 0
          fi

          gh release create "${{ steps.released-tag.outputs.tag }}" --generate-notes --latest

  build-macos-release-assets:
    name: Build macOS release assets
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: macos-latest
    concurrency:
      group: release-assets-${{ needs.release.outputs.tag }}
      cancel-in-progress: false
    env:
      BUN_CONFIG_AUDIT: "false"
      NODE_OPTIONS: "--max-old-space-size=4096"
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
      SOLUTIONS_UI_REF: ${{ vars.DESKTOP_SOLUTIONS_UI_REF || 'main' }}
    permissions:
      contents: read

    steps:
      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ardor-desktop
            solutions-ui

      - name: Checkout desktop release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: ardor-desktop
          fetch-depth: 0
          token: ${{ steps.release-app-token.outputs.token }}

      - name: Checkout solutions-ui
        uses: actions/checkout@v4
        with:
          repository: Ardor-Cerebrum/solutions-ui
          ref: ${{ env.SOLUTIONS_UI_REF }}
          path: solutions-ui
          fetch-depth: 1
          token: ${{ steps.release-app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: ardor-desktop
        run: bun install --frozen-lockfile

      - name: Install UI dependencies
        working-directory: solutions-ui
        run: bun install --frozen-lockfile

      - name: Build stage1 macOS app
        working-directory: ardor-desktop
        run: bun run build:stage1

      - name: Package stage1 macOS app
        working-directory: ardor-desktop
        run: |
          mkdir -p dist/release
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/Ardor Dev.app" \
            "dist/release/Ardor-Dev-${RELEASE_TAG}-macos.zip"

      - name: Build production macOS app
        working-directory: ardor-desktop
        env:
          VITE_API_URL: ${{ vars.DESKTOP_PROD_API_URL }}
          VITE_ARTIFACT_API_URL: ${{ vars.DESKTOP_PROD_ARTIFACT_API_URL }}
          VITE_AUTH0_DOMAIN: ${{ vars.DESKTOP_PROD_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.DESKTOP_PROD_AUTH0_CLIENT_ID }}
          VITE_AMPLITUDE_API_KEY: ${{ vars.DESKTOP_PROD_AMPLITUDE_API_KEY }}
          VITE_SENTRY_DSN: ${{ vars.DESKTOP_PROD_SENTRY_DSN }}
          VITE_STRIPE_PRICING_TABLE_ID: ${{ vars.DESKTOP_PROD_STRIPE_PRICING_TABLE_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.DESKTOP_PROD_STRIPE_PUBLISHABLE_KEY }}
        run: bun run build:prod

      - name: Package production macOS app
        working-directory: ardor-desktop
        run: |
          mkdir -p dist/release
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/Ardor.app" \
            "dist/release/Ardor-${RELEASE_TAG}-macos.zip"

      - name: Upload release assets
        working-directory: ardor-desktop
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: gh release upload "$RELEASE_TAG" dist/release/*.zip --clobber
