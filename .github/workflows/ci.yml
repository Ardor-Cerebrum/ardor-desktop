name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate desktop
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.11.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: 1.88.0
          components: clippy,rustfmt

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit JavaScript dependencies
        run: bun audit

      - name: Verify release CLI
        run: bun run release --version

      - name: Test release security boundaries
        run: bun run test:release-security

      - name: Test desktop UI contract verifier
        run: bun run test:ui-contract

      - name: Test updater manifest generation
        run: bun run test:update-manifest

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml
