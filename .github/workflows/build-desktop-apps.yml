name: Build Desktop Apps

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-apps:
    name: Build macOS apps
    runs-on: macos-latest
    concurrency:
      group: build-macos-apps-${{ github.ref }}
      cancel-in-progress: true
    env:
      BUN_CONFIG_AUDIT: "false"
      NODE_OPTIONS: "--max-old-space-size=4096"
      SOLUTIONS_UI_REF: ${{ vars.DESKTOP_SOLUTIONS_UI_REF || 'main' }}

    steps:
      - name: Create build app token
        id: build-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ardor-desktop
            solutions-ui

      - name: Checkout desktop
        uses: actions/checkout@v4
        with:
          path: ardor-desktop
          fetch-depth: 0
          token: ${{ steps.build-app-token.outputs.token }}

      - name: Checkout solutions-ui
        uses: actions/checkout@v4
        with:
          repository: Ardor-Cerebrum/solutions-ui
          ref: ${{ env.SOLUTIONS_UI_REF }}
          path: solutions-ui
          fetch-depth: 1
          token: ${{ steps.build-app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        working-directory: ardor-desktop
        run: bun install --frozen-lockfile

      - name: Install UI dependencies
        working-directory: solutions-ui
        run: bun install --frozen-lockfile

      - name: Build stage1 macOS app
        working-directory: ardor-desktop
        run: bun run build:stage1

      - name: Package stage1 macOS app
        working-directory: ardor-desktop
        run: |
          mkdir -p dist/ci
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/Ardor Dev.app" \
            "dist/ci/Ardor-Dev-ci-macos.zip"

      - name: Build production macOS app
        working-directory: ardor-desktop
        env:
          VITE_API_URL: ${{ vars.DESKTOP_PROD_API_URL }}
          VITE_ARTIFACT_API_URL: ${{ vars.DESKTOP_PROD_ARTIFACT_API_URL }}
          VITE_AUTH0_DOMAIN: ${{ vars.DESKTOP_PROD_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.DESKTOP_PROD_AUTH0_CLIENT_ID }}
          VITE_AMPLITUDE_API_KEY: ${{ vars.DESKTOP_PROD_AMPLITUDE_API_KEY }}
          VITE_SENTRY_DSN: ${{ vars.DESKTOP_PROD_SENTRY_DSN }}
          VITE_STRIPE_PRICING_TABLE_ID: ${{ vars.DESKTOP_PROD_STRIPE_PRICING_TABLE_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.DESKTOP_PROD_STRIPE_PUBLISHABLE_KEY }}
        run: bun run build:prod

      - name: Package production macOS app
        working-directory: ardor-desktop
        run: |
          mkdir -p dist/ci
          ditto -c -k --keepParent \
            "src-tauri/target/release/bundle/macos/Ardor.app" \
            "dist/ci/Ardor-ci-macos.zip"

      - name: Upload macOS app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ardor-desktop-macos-apps
          path: ardor-desktop/dist/ci/*.zip
          if-no-files-found: error
