name: Build ARD-2441 macOS artifact

on:
  push:
    branches:
      - build/ard-2441-macos
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ard-2441-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build universal Ardor Dev app
    runs-on: macos-26
    env:
      BUN_CONFIG_AUDIT: "false"
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
      NODE_OPTIONS: --max-old-space-size=4096
      SOLUTIONS_UI_REF: eba9113408c1e0ec805a95fb96e496d21ebd1ebf

    steps:
      - name: Create read-only solutions-ui token
        id: solutions-ui-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: solutions-ui
          permission-contents: read

      - name: Checkout desktop feature
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: ardor-desktop
          persist-credentials: false

      - name: Checkout matching solutions-ui feature
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Ardor-Cerebrum/solutions-ui
          ref: ${{ env.SOLUTIONS_UI_REF }}
          path: solutions-ui
          token: ${{ steps.solutions-ui-token.outputs.token }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5

      - name: Setup Rust targets
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-06-30
        with:
          toolchain: 1.88.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Verify toolchain
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          rustc -vV

      - name: Install desktop dependencies
        working-directory: ardor-desktop
        run: bun install --frozen-lockfile

      - name: Install UI dependencies
        working-directory: solutions-ui
        run: bun install --frozen-lockfile

      - name: Verify desktop UI contract
        run: node ardor-desktop/scripts/verify-desktop-ui-contract.mjs solutions-ui

      - name: Build ad-hoc signed universal macOS app
        working-directory: ardor-desktop
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: bun run tauri:build:stage1 -- --target universal-apple-darwin --bundles app

      - name: Verify and package app
        working-directory: ardor-desktop
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/Ardor Dev.app"
          test -d "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          mkdir -p dist/macos
          ditto -c -k --keepParent "$APP_PATH" dist/macos/Ardor-Dev-ARD-2441-macos-universal.zip
          shasum -a 256 dist/macos/Ardor-Dev-ARD-2441-macos-universal.zip \
            > dist/macos/Ardor-Dev-ARD-2441-macos-universal.zip.sha256

      - name: Upload macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ard-2441-macos-universal
          path: ardor-desktop/dist/macos/*
          if-no-files-found: error
          retention-days: 7
